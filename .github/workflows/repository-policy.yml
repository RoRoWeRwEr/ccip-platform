name: Repository Policy

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: repository-policy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  policy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Validate migration ordering and repository policy
        env:
          BASE_REF: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || '' }}
        run: bash scripts/validate_repository_policy.sh
      - name: Validate YAML syntax and style
        run: |
          python -m pip install --disable-pip-version-check yamllint==1.35.1
          yamllint -d '{extends: relaxed, rules: {line-length: disable, truthy: disable}}' .github
      - name: Validate Markdown relative links
        run: python scripts/check_markdown_links.py
      - name: Check whitespace errors
        run: git diff --check
