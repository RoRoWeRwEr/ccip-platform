name: Claude Review

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to review
        required: true
        type: string

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  review:
    if: >-
      vars.CLAUDE_CODE_ENABLED == 'true' &&
      ((github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trusted base repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Run independent review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Act only as an independent reviewer. Follow CLAUDE.md.
            Review PR ${{ inputs.pr_number || github.event.issue.number || github.event.pull_request.number }} in ${{ github.repository }}.
            Classify findings as Blocking, Important, or Suggestion. Review security, PostgreSQL, RLS, performance, compatibility, migration integrity, tests, naming, and production readiness.
            Do not edit files, create commits, push branches, merge, approve, or change database design. Post review feedback only.
          claude_args: >-
            --max-turns 10
            --allowedTools "Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*)"
