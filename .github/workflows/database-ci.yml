name: Database CI
permissions:
  contents: read
on:
  pull_request:
    paths: ["supabase/migrations/**", "supabase/tests/**"]
  push:
    branches: [main]
    paths: ["supabase/migrations/**"]

jobs:
  migrate-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: supabase/postgres:15.1.0.117
        env:
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Start local Supabase stack
        run: supabase start
      - name: Apply all migrations from empty
        run: supabase db reset
      - name: Run pgTAP suite
        run: supabase test db
      - name: Advisor checks (RLS/security lints)
        run: supabase db lint --level warning
      - name: Fail on any lint error
        run: supabase db lint --level error
