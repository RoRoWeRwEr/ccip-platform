name: Bug
description: Report reproducible incorrect behavior.
title: "bug: "
labels: [bug]
body:
  - type: textarea
    id: observed
    attributes: {label: Observed behavior}
    validations: {required: true}
  - type: textarea
    id: expected
    attributes: {label: Expected behavior}
    validations: {required: true}
  - type: textarea
    id: reproduction
    attributes: {label: Minimal reproduction, description: Include exact commands, inputs, environment, and sanitized logs.}
    validations: {required: true}
  - type: textarea
    id: impact
    attributes: {label: Impact and security assessment}
    validations: {required: true}
  - type: textarea
    id: acceptance
    attributes: {label: Acceptance criteria and regression tests}
    validations: {required: true}
